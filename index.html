<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 10.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#fff;
--accent:#22d3ee;
--danger:#ef4444;
}
.light{
--bg:#f1f5f9;
--card:#fff;
--text:#111;
--accent:#2563eb;
--danger:#dc2626;
}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
.nav{display:flex;flex-wrap:wrap;gap:8px;padding:15px;background:var(--card);}
.nav button{background:none;border:none;color:var(--text);cursor:pointer;font-weight:600;}
.section{display:none;padding:20px;}
.active{display:block;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.card{background:var(--card);padding:15px;border-radius:15px;margin-top:15px;}
input,select,textarea{width:100%;padding:8px;margin-top:6px;border-radius:10px;border:none;}
button.action{background:var(--accent);border:none;padding:8px;margin-top:8px;border-radius:10px;color:white;cursor:pointer;}
.progressbar{height:8px;background:#334155;border-radius:10px;overflow:hidden;margin-top:6px;}
.progress{height:100%;background:var(--accent);}
.circle{width:120px;height:120px;position:relative;margin:10px;}
.circle svg{transform:rotate(-90deg);}
.circle span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-weight:700;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
.day{background:var(--card);padding:6px;border-radius:8px;min-height:70px;font-size:11px;cursor:pointer;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;}
.modal-content{background:var(--card);padding:20px;border-radius:15px;width:90%;max-width:500px;}
</style>
</head>
<body>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('tasks')">Tasks</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('calendar')">Calendar</button>
<button onclick="show('learning')">Learning</button>
<button onclick="show('revenue')">Revenue</button>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<select id="monthFilter" onchange="refreshAll()"></select>
<div id="taskCompetition" class="card"></div>
<div id="videoStats" class="card"></div>
<div id="financeStats" class="card"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Daily Tasks</h2>

<select id="taskOwner">
<option>Naman</option>
<option>Prateek</option>
</select>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<input placeholder="Sub Folder" id="taskSub">
<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input placeholder="Task" id="taskText">
<button class="action" onclick="addTask()">Add Task</button>

<select id="subFilter" onchange="renderTasks()">
<option value="">All Subfolders</option>
</select>

<div id="dailyTaskProgress"></div>
<div id="taskList"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Video Pipeline</h2>
<input placeholder="Video Topic" id="videoTopic">
<input type="date" id="videoDate">
<textarea placeholder="Script" id="videoScript"></textarea>
<button class="action" onclick="addVideo()">Add Video</button>
<div id="videoList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Calendar</h2>
<div id="calendarGrid" class="calendar"></div>
<div id="calendarVideos"></div>
</div>

<!-- LEARNING -->
<div id="learning" class="section">
<h2>All Learnings</h2>
<div id="learningList"></div>
</div>

<!-- REVENUE -->
<div id="revenue" class="section">
<h2>Revenue & Expense</h2>

<select id="entryType">
<option>Revenue</option>
<option>Expense</option>
</select>

<input placeholder="Amount" id="entryAmount" type="number">
<input placeholder="Category" id="entryCategory">
<input placeholder="Description" id="entryDesc">
<input type="date" id="entryDate">

<select id="splitType">
<option value="single">Single</option>
<option value="equal">Equal</option>
<option value="custom">Custom</option>
</select>

<input placeholder="Naman Share" id="namanShare" type="number">
<input placeholder="Prateek Share" id="prateekShare" type="number">

<button class="action" onclick="addEntry()">Add Entry</button>

<canvas id="financeChart"></canvas>
<div id="financeBreakdown"></div>
</div>

<div class="modal" id="scriptModal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<textarea id="modalScript"></textarea>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyA9Ngg4cZ6H0gOePfHZ4GOg1_YZe5qZS7Y",
authDomain:"progress-app-6e9e6.firebaseapp.com",
projectId:"progress-app-6e9e6"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const tasksRef=db.collection("tasks");
const videosRef=db.collection("videos");
const learningRef=db.collection("learnings");
const financeRef=db.collection("finance");

let tasks=[],videos=[],learnings=[],finance=[];

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleMode(){document.body.classList.toggle("light");}

const today=new Date().toISOString().slice(0,10);

function addTask(){
tasksRef.add({
text:taskText.value,
owner:taskOwner.value,
category:taskCategory.value,
sub:taskSub.value,
priority:taskPriority.value,
done:false,
date:today
});
taskText.value="";
}

tasksRef.onSnapshot(s=>{
tasks=[];
subFilter.innerHTML=`<option value="">All Subfolders</option>`;
s.forEach(d=>{
tasks.push({id:d.id,...d.data()});
});
let subs=[...new Set(tasks.map(t=>t.sub).filter(Boolean))];
subs.forEach(sub=>{
subFilter.innerHTML+=`<option>${sub}</option>`;
});
renderTasks();
});

function renderTasks(){
taskList.innerHTML="";
let sub=subFilter.value;
let todayTasks=tasks.filter(t=>t.date===today);
if(sub) todayTasks=todayTasks.filter(t=>t.sub===sub);

todayTasks.forEach(t=>{
taskList.innerHTML+=`
<div class="card">
<input type="checkbox" ${t.done?"checked":""}
onclick="tasksRef.doc('${t.id}').update({done:${!t.done}})">
<b>${t.text}</b> (${t.owner})
<button onclick="tasksRef.doc('${t.id}').delete()">X</button>
</div>`;
});

let done=todayTasks.filter(t=>t.done).length;
let percent=todayTasks.length?Math.round((done/todayTasks.length)*100):0;
dailyTaskProgress.innerHTML=`Daily Progress: ${percent}%`;
if(todayTasks.some(t=>t.priority==="High"&&!t.done)) alert("High Priority Task Pending!");
}

function addVideo(){
videosRef.add({
topic:videoTopic.value,
script:videoScript.value,
publishDate:videoDate.value,
stages:{scripting:true,shooting:false,editing:false,thumbnail:false,posting:false}
});
}

videosRef.onSnapshot(s=>{
videos=[];
videoList.innerHTML="";
s.forEach(d=>{
let v={id:d.id,...d.data()};
videos.push(v);
let completed=Object.values(v.stages).filter(Boolean).length;
let percent=Math.round((completed/5)*100);

videoList.innerHTML+=`
<div class="card">
<b onclick="openModal('${v.id}')">${v.topic}</b>
<div>${percent}%</div>
${Object.keys(v.stages).map(stage=>`
<label><input type="checkbox"
${v.stages[stage]?"checked":""}
onclick="toggleStage('${v.id}','${stage}',${v.stages[stage]})">
${stage}</label>`).join("<br>")}
</div>`;
});
renderCalendar();
});

function toggleStage(id,stage,current){
videosRef.doc(id).update({[`stages.${stage}`]:!current});
if(stage==="posting"&&!current){
let v=videos.find(v=>v.id===id);
learningRef.add({topic:v.topic,learning:"",date:new Date().toISOString()});
}
}

function openModal(id){
let v=videos.find(v=>v.id===id);
modalTitle.innerText=v.topic;
modalScript.value=v.script;
scriptModal.style.display="flex";
}

function closeModal(){scriptModal.style.display="none";}

learningRef.onSnapshot(s=>{
learningList.innerHTML="";
s.forEach(d=>{
let l=d.data();
learningList.innerHTML+=`<div class="card">${l.topic} - ${l.learning||"No learning yet"}</div>`;
});
});

function renderCalendar(){
calendarGrid.innerHTML="";
let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();
let days=new Date(year,month+1,0).getDate();
for(let d=1;d<=days;d++){
let full=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
let vids=videos.filter(v=>v.publishDate===full);
calendarGrid.innerHTML+=`
<div class="day" onclick="showDay('${full}')">
<b>${d}</b><br>${vids.map(v=>v.topic).join("<br>")}
</div>`;
}
}

function showDay(date){
calendarVideos.innerHTML=videos.filter(v=>v.publishDate===date)
.map(v=>`<div class="card">${v.topic}</div>`).join("");
}

function addEntry(){
financeRef.add({
type:entryType.value,
amount:Number(entryAmount.value),
category:entryCategory.value,
desc:entryDesc.value,
date:entryDate.value,
splitType:splitType.value,
naman:Number(namanShare.value)||0,
prateek:Number(prateekShare.value)||0
});
}

financeRef.onSnapshot(s=>{
finance=[];
s.forEach(d=>finance.push(d.data()));
updateFinance();
});

function updateFinance(){
let rev=finance.filter(f=>f.type==="Revenue")
.reduce((a,b)=>a+b.amount,0);
let exp=finance.filter(f=>f.type==="Expense")
.reduce((a,b)=>a+b.amount,0);
let net=rev-exp;

financeBreakdown.innerHTML=`Revenue: ${rev}<br>Expense: ${exp}<br>Net: ${net}`;

new Chart(financeChart,{
type:'bar',
data:{labels:['Revenue','Expense'],
datasets:[{data:[rev,exp]}]}
});
}

function refreshAll(){
renderTasks();
updateFinance();
}
</script>
</body>
</html>

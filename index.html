<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 8.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--accent:#22d3ee;
--danger:#ef4444;
}
.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--accent:#2563eb;
--danger:#dc2626;
}
body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}
.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
}
.nav button{
background:none;
border:none;
color:var(--text);
font-weight:600;
cursor:pointer;
margin-right:10px;
}
.section{display:none;padding:20px;}
.active{display:block;}
.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-top:15px;
}
input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}
button.action{
background:var(--accent);
border:none;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
}
.progressbar{
height:8px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}
.progress{
height:100%;
background:var(--accent);
}
.stat-box{
background:var(--card);
padding:15px;
border-radius:15px;
margin-top:15px;
}
</style>
</head>
<body>

<div class="nav">
<div>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('tasks')">Tasks</button>
<button onclick="showSection('videos')">Videos</button>
</div>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="taskStats" class="stat-box"></div>
<div id="videoStats" class="stat-box"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Tasks (Realtime)</h2>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" id="taskInput" placeholder="Enter task">
<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Video Pipeline (Realtime)</h2>

<input type="text" id="videoTitle" placeholder="Video Title">
<textarea id="videoScript" rows="5" placeholder="Write script..."></textarea>
<button class="action" onclick="addVideo()">Add Video</button>

<div id="videoList"></div>
</div>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE INIT */
const firebaseConfig = {
  apiKey: "AIzaSyA9Ngg4cZ6H0gOePfHZ4GOg1_YZe5qZS7Y",
  authDomain: "progress-app-6e9e6.firebaseapp.com",
  projectId: "progress-app-6e9e6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const tasksRef = db.collection("tasks");
const videosRef = db.collection("videos");

let tasks = [];
let videos = [];

/* NAVIGATION */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleMode(){
document.body.classList.toggle("light");
}

/* ================= TASKS ================= */

function addTask(){
if(!taskInput.value) return;

tasksRef.add({
text: taskInput.value,
cat: taskCategory.value,
pri: taskPriority.value,
done:false,
created: Date.now()
});

taskInput.value="";
}

function toggleTask(id,current){
tasksRef.doc(id).update({done:!current});
}

function deleteTask(id){
tasksRef.doc(id).delete();
}

tasksRef.orderBy("created").onSnapshot(snapshot=>{
tasks=[];
taskList.innerHTML="";
snapshot.forEach(doc=>{
let t = doc.data();
tasks.push({id:doc.id,...t});
taskList.innerHTML+=`
<div class="card">
<input type="checkbox" ${t.done?"checked":""}
onclick="toggleTask('${doc.id}',${t.done})">
<b>${t.text}</b> (${t.cat}-${t.pri})
<button onclick="deleteTask('${doc.id}')"
style="float:right;background:red;color:white;border:none;">X</button>
</div>`;
});
updateDashboard();
});

/* ================= VIDEOS ================= */

function addVideo(){
if(!videoTitle.value) return;

videosRef.add({
title: videoTitle.value,
script: videoScript.value,
stages:{
scripting:true,
shooting:false,
editing:false,
thumbnail:false,
posting:false
},
created: Date.now()
});

videoTitle.value="";
videoScript.value="";
}

function updateScript(id,value){
videosRef.doc(id).update({script:value});
}

function toggleStage(id,stage,current){
videosRef.doc(id).update({[`stages.${stage}`]:!current});
}

function deleteVideo(id){
videosRef.doc(id).delete();
}

videosRef.orderBy("created").onSnapshot(snapshot=>{
videos=[];
videoList.innerHTML="";
snapshot.forEach(doc=>{
let v = doc.data();
videos.push({id:doc.id,...v});

let completed = Object.values(v.stages).filter(Boolean).length;
let percent = Math.round((completed/5)*100);

videoList.innerHTML+=`
<div class="card">
<h3>${v.title}</h3>

<textarea rows="4"
onchange="updateScript('${doc.id}',this.value)">${v.script||""}</textarea>

<label><input type="checkbox" ${v.stages.scripting?"checked":""}
onclick="toggleStage('${doc.id}','scripting',${v.stages.scripting})"> Scripting</label><br>

<label><input type="checkbox" ${v.stages.shooting?"checked":""}
onclick="toggleStage('${doc.id}','shooting',${v.stages.shooting})"> Shooting</label><br>

<label><input type="checkbox" ${v.stages.editing?"checked":""}
onclick="toggleStage('${doc.id}','editing',${v.stages.editing})"> Editing</label><br>

<label><input type="checkbox" ${v.stages.thumbnail?"checked":""}
onclick="toggleStage('${doc.id}','thumbnail',${v.stages.thumbnail})"> Thumbnail</label><br>

<label><input type="checkbox" ${v.stages.posting?"checked":""}
onclick="toggleStage('${doc.id}','posting',${v.stages.posting})"> Posting</label>

<div class="progressbar">
<div class="progress" style="width:${percent}%"></div>
</div>

<b>${percent}% Complete</b>

<button onclick="deleteVideo('${doc.id}')"
style="margin-top:10px;background:red;color:white;border:none;">Delete</button>
</div>`;
});
updateDashboard();
});

/* ================= DASHBOARD ================= */

function updateDashboard(){
let totalTasks = tasks.length;
let completedTasks = tasks.filter(t=>t.done).length;
let taskPercent = totalTasks ? Math.round((completedTasks/totalTasks)*100) : 0;

taskStats.innerHTML = `
<h3>Tasks</h3>
Total: ${totalTasks}<br>
Completed: ${completedTasks}<br>
Progress: ${taskPercent}%
`;

let totalVideos = videos.length;
let postedVideos = videos.filter(v=>v.stages.posting).length;

videoStats.innerHTML = `
<h3>Videos</h3>
Total: ${totalVideos}<br>
Posted: ${postedVideos}
`;
}

</script>
</body>
</html>

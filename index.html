<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--accent:#22d3ee;
--danger:#ef4444;
}

.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--accent:#2563eb;
--danger:#dc2626;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
position:sticky;
top:0;
z-index:10;
}

.nav button{
background:none;
border:none;
color:var(--text);
font-weight:600;
cursor:pointer;
margin-right:10px;
}

.section{display:none;padding:20px;}
.active{display:block;}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button.action{
background:var(--accent);
border:none;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
}

.calendar-header{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
font-weight:600;
margin-top:10px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:6px;
}

.day{
background:var(--card);
padding:6px;
border-radius:10px;
min-height:80px;
font-size:12px;
}

.alert{
background:var(--danger);
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.progressbar{
height:8px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.progress{
height:100%;
background:var(--accent);
}

.circle{
width:120px;
margin:10px;
text-align:center;
}

.circle svg{transform:rotate(-90deg);}

.flex{
display:flex;
flex-wrap:wrap;
}

</style>
</head>
<body>

<div class="nav">
<div>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('tasks')">Tasks</button>
<button onclick="showSection('calendar')">Calendar</button>
<button onclick="showSection('videos')">Scripts</button>
</div>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="priorityAlert"></div>
<div class="flex" id="progressCircles"></div>
<div class="card" id="videoStats"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Tasks</h2>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" id="taskInput" placeholder="Enter task">
<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Content Calendar</h2>

<input type="date" id="contentDate">
<input type="text" id="contentText" placeholder="Video Idea">
<button class="action" onclick="addContent()">Add</button>

<div class="calendar-header">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div class="calendar" id="calendarGrid"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Script Studio</h2>

<input type="text" id="videoTitle" placeholder="Video Title">
<textarea id="videoScript" rows="6" placeholder="Write script..."></textarea>
<button class="action" onclick="addVideo()">Add Video</button>

<div id="videoList"></div>
</div>

<title>Naman OS 5.0</title>

<body>

<div class="nav">
<div>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('tasks')">Tasks</button>
<button onclick="showSection('calendar')">Calendar</button>
<button onclick="showSection('videos')">Scripts</button>
</div>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="priorityAlert"></div>
<div class="flex" id="progressCircles"></div>
<div class="card" id="videoStats"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Tasks</h2>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" id="taskInput" placeholder="Enter task">
<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Content Calendar</h2>

<input type="date" id="contentDate">
<input type="text" id="contentText" placeholder="Video Idea">
<button class="action" onclick="addContent()">Add</button>

<div class="calendar-header">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div class="calendar" id="calendarGrid"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Script Studio</h2>

<input type="text" id="videoTitle" placeholder="Video Title">
<textarea id="videoScript" rows="6" placeholder="Write script..."></textarea>
<button class="action" onclick="addVideo()">Add Video</button>

<div id="videoList"></div>
</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
let contents=JSON.parse(localStorage.getItem("contents"))||[];
let videos=JSON.parse(localStorage.getItem("videos"))||[];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
localStorage.setItem("contents",JSON.stringify(contents));
localStorage.setItem("videos",JSON.stringify(videos));
}

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
updateDashboard();
}

function toggleMode(){
document.body.classList.toggle("light");
}

/* TASKS */

function addTask(){
let cat=taskCategory.value;
let pri=taskPriority.value;
let text=taskInput.value;
if(!text)return;
tasks.push({cat,pri,text,done:false});
taskInput.value="";
save();
renderTasks();
updateDashboard();
}

function toggleTask(i){
tasks[i].done=!tasks[i].done;
save();
renderTasks();
updateDashboard();
}

function deleteTask(i){
tasks.splice(i,1);
save();
renderTasks();
updateDashboard();
}

function renderTasks(){
taskList.innerHTML="";
tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="card">
<input type="checkbox" ${t.done?"checked":""}
onclick="toggleTask(${i})">
<b>${t.text}</b> (${t.cat} - ${t.pri})
<button onclick="deleteTask(${i})" style="float:right;background:var(--danger);border:none;color:white;border-radius:6px;">X</button>
</div>`;
});
}

/* CALENDAR */

function renderCalendar(){
calendarGrid.innerHTML="";
let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();
let first=new Date(year,month,1).getDay();
let days=new Date(year,month+1,0).getDate();

for(let i=0;i<first;i++){
calendarGrid.innerHTML+=`<div></div>`;
}

for(let d=1;d<=days;d++){
let full=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
let events=contents.filter(c=>c.date===full).map(c=>c.text).join("<br>");
calendarGrid.innerHTML+=`
<div class="day">
<b>${d}</b><br>${events}
</div>`;
}
}

function addContent(){
let date=contentDate.value;
let text=contentText.value;
if(!date||!text)return;
contents.push({date,text});
contentText.value="";
save();
renderCalendar();
}

/* VIDEOS */

function addVideo(){
let title=videoTitle.value;
let script=videoScript.value;
if(!title)return;

videos.push({
title,
script,
stages:{scripting:true,shooting:false,editing:false,thumbnail:false,uploaded:false}
});

videoTitle.value="";
videoScript.value="";
save();
renderVideos();
updateDashboard();
}

function toggleStage(i,stage){
videos[i].stages[stage]=!videos[i].stages[stage];
save();
renderVideos();
updateDashboard();
}

function deleteVideo(i){
videos.splice(i,1);
save();
renderVideos();
updateDashboard();
}

function renderVideos(){
videoList.innerHTML="";
videos.forEach((v,i)=>{
let completed=Object.values(v.stages).filter(Boolean).length;
let percent=Math.round((completed/5)*100);

videoList.innerHTML+=`
<div class="card">
<h3>${v.title}</h3>
<textarea rows="4" onchange="videos[${i}].script=this.value;save();">${v.script}</textarea>

<label><input type="checkbox" ${v.stages.scripting?"checked":""}
onclick="toggleStage(${i},'scripting')"> Scripting</label><br>
<label><input type="checkbox" ${v.stages.shooting?"checked":""}
onclick="toggleStage(${i},'shooting')"> Shooting</label><br>
<label><input type="checkbox" ${v.stages.editing?"checked":""}
onclick="toggleStage(${i},'editing')"> Editing</label><br>
<label><input type="checkbox" ${v.stages.thumbnail?"checked":""}
onclick="toggleStage(${i},'thumbnail')"> Thumbnail</label><br>
<label><input type="checkbox" ${v.stages.uploaded?"checked":""}
onclick="toggleStage(${i},'uploaded')"> Uploaded</label>

<div class="progressbar">
<div class="progress" style="width:${percent}%"></div>
</div>
<b>${percent}% Complete</b>

<button onclick="deleteVideo(${i})" style="background:var(--danger);border:none;color:white;border-radius:6px;margin-top:6px;">Delete</button>
</div>`;
});
}

/* DASHBOARD */

function updateDashboard(){
let high=tasks.filter(t=>t.pri==="High"&&!t.done);
priorityAlert.innerHTML=
high.length?`<div class="alert">⚠ ${high.length} High Priority Tasks Pending</div>`:"";

let total=tasks.length;
let done=tasks.filter(t=>t.done).length;
let overall=total?Math.round((done/total)*100):0;

progressCircles.innerHTML=generateCircle("Overall",overall);

let scripted=videos.filter(v=>v.stages.scripting).length;
let shooting=videos.filter(v=>v.stages.shooting).length;
let editing=videos.filter(v=>v.stages.editing).length;
let uploaded=videos.filter(v=>v.stages.uploaded).length;

videoStats.innerHTML=`
📝 Scripted: ${scripted}<br>
🎥 Shooting: ${shooting}<br>
✂ Editing: ${editing}<br>
🚀 Uploaded: ${uploaded}
`;
}

function generateCircle(label,p){
let r=50;
let circ=2*Math.PI*r;
let offset=circ-(circ*p)/100;
return `
<div class="circle">
<svg width="120" height="120">
<circle cx="60" cy="60" r="${r}" stroke="#334155" stroke-width="10" fill="none"/>
<circle cx="60" cy="60" r="${r}" stroke="var(--accent)" stroke-width="10"
fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
stroke-linecap="round"/>
</svg>
${label}<br>${p}%
</div>`;
}

/* INIT */

renderTasks();
renderVideos();
renderCalendar();
updateDashboard();

</script>
</body>

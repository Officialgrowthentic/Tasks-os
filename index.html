<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--accent:#22d3ee;
--danger:#ef4444;
}

.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--accent:#2563eb;
--danger:#dc2626;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
position:sticky;
top:0;
z-index:10;
}

.nav button{
background:none;
border:none;
color:var(--text);
font-weight:600;
cursor:pointer;
margin-right:10px;
}

.section{display:none;padding:20px;}
.active{display:block;}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button.action{
background:var(--accent);
border:none;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
}

.calendar-header{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
font-weight:600;
margin-top:10px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:6px;
}

.day{
background:var(--card);
padding:6px;
border-radius:10px;
min-height:80px;
font-size:12px;
}

.alert{
background:var(--danger);
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.progressbar{
height:8px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.progress{
height:100%;
background:var(--accent);
}

.circle{
width:120px;
margin:10px;
text-align:center;
}

.circle svg{transform:rotate(-90deg);}

.flex{
display:flex;
flex-wrap:wrap;
}

</style>
</head>
<body>

<div class="nav">
<div>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('tasks')">Tasks</button>
<button onclick="showSection('calendar')">Calendar</button>
<button onclick="showSection('videos')">Scripts</button>
</div>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="priorityAlert"></div>
<div class="flex" id="progressCircles"></div>
<div class="card" id="videoStats"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Tasks</h2>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" id="taskInput" placeholder="Enter task">
<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Content Calendar</h2>

<input type="date" id="contentDate">
<input type="text" id="contentText" placeholder="Video Idea">
<button class="action" onclick="addContent()">Add</button>

<div class="calendar-header">
<div>Sun</div><div>Mon</div><div>Tue</div>
<div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>

<div class="calendar" id="calendarGrid"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Script Studio</h2>

<input type="text" id="videoTitle" placeholder="Video Title">
<textarea id="videoScript" rows="6" placeholder="Write script..."></textarea>
<button class="action" onclick="addVideo()">Add Video</button>

<div id="videoList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9Ngg4cZ6H0gOePfHZ4GOg1_YZe5qZS7Y",
  authDomain: "progress-app-6e9e6.firebaseapp.com",
  projectId: "progress-app-6e9e6",
  storageBucket: "progress-app-6e9e6.firebasestorage.app",
  messagingSenderId: "867817123277",
  appId: "1:867817123277:web:6d8fd798a621684295a884"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const taskList = document.getElementById("taskList");
const tasksCollection = collection(db, "tasks");

/* ADD TASK */
window.addTask = async function(){
  let cat = taskCategory.value;
  let pri = taskPriority.value;
  let text = taskInput.value;
  if(!text) return;

  await addDoc(tasksCollection,{
    cat, pri, text, done:false, created:Date.now()
  });

  taskInput.value="";
};

/* REALTIME LISTENER */
onSnapshot(tasksCollection,(snapshot)=>{
  taskList.innerHTML="";
  snapshot.forEach((docSnap)=>{
    let t = docSnap.data();
    taskList.innerHTML+=`
    <div class="card">
      <input type="checkbox" ${t.done?"checked":""}
      onclick="toggleTask('${docSnap.id}', ${t.done})">
      <b>${t.text}</b> (${t.cat} - ${t.pri})
      <button onclick="deleteTask('${docSnap.id}')"
      style="float:right;background:red;color:white;border:none;border-radius:6px;">X</button>
    </div>`;
  });
});

/* TOGGLE */
window.toggleTask = async function(id,current){
  await updateDoc(doc(db,"tasks",id),{
    done:!current
  });
};

/* DELETE */
window.deleteTask = async function(id){
  await deleteDoc(doc(db,"tasks",id));
};

</script>
</body>
</html>

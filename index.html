<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 7.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--accent:#22d3ee;
--danger:#ef4444;
}
.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--accent:#2563eb;
--danger:#dc2626;
}
body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}
.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
}
.nav button{
background:none;
border:none;
color:var(--text);
font-weight:600;
cursor:pointer;
margin-right:10px;
}
.section{display:none;padding:20px;}
.active{display:block;}
.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-top:15px;
}
input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}
button.action{
background:var(--accent);
border:none;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
}
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:10px;
}
.day{
background:var(--card);
padding:6px;
border-radius:10px;
min-height:70px;
font-size:12px;
}
</style>
</head>
<body>

<div class="nav">
<div>
<button onclick="showSection('tasks')">Tasks</button>
<button onclick="showSection('calendar')">Calendar</button>
<button onclick="showSection('videos')">Scripts</button>
</div>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- TASKS -->
<div id="tasks" class="section active">
<h2>Tasks (Realtime Sync)</h2>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" id="taskInput" placeholder="Enter task">
<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Content Calendar (Local)</h2>
<input type="date" id="contentDate">
<input type="text" id="contentText" placeholder="Video Idea">
<button class="action" onclick="addContent()">Add</button>
<div class="calendar" id="calendarGrid"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Script Studio (Local)</h2>
<input type="text" id="videoTitle" placeholder="Video Title">
<textarea id="videoScript" rows="5"></textarea>
<button class="action" onclick="addVideo()">Add Video</button>
<div id="videoList"></div>
</div>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE INIT */

const firebaseConfig = {
  apiKey: "AIzaSyA9Ngg4cZ6H0gOePfHZ4GOg1_YZe5qZS7Y",
  authDomain: "progress-app-6e9e6.firebaseapp.com",
  projectId: "progress-app-6e9e6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tasksRef = db.collection("tasks");

let tasks = [];
let contents = JSON.parse(localStorage.getItem("contents")) || [];
let videos = JSON.parse(localStorage.getItem("videos")) || [];

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleMode(){
document.body.classList.toggle("light");
}

/* TASKS (REALTIME) */

function addTask(){
let text = taskInput.value;
if(!text) return;

tasksRef.add({
text,
cat: taskCategory.value,
pri: taskPriority.value,
done:false,
created: Date.now()
});

taskInput.value="";
}

function toggleTask(id,current){
tasksRef.doc(id).update({done:!current});
}

function deleteTask(id){
tasksRef.doc(id).delete();
}

tasksRef.orderBy("created").onSnapshot(snapshot=>{
tasks=[];
taskList.innerHTML="";
snapshot.forEach(doc=>{
let t = doc.data();
taskList.innerHTML+=`
<div class="card">
<input type="checkbox" ${t.done?"checked":""}
onclick="toggleTask('${doc.id}',${t.done})">
<b>${t.text}</b> (${t.cat}-${t.pri})
<button onclick="deleteTask('${doc.id}')" style="float:right;background:red;color:white;border:none;">X</button>
</div>
`;
});
});

/* CALENDAR (LOCAL) */

function addContent(){
if(!contentDate.value || !contentText.value) return;
contents.push({date:contentDate.value,text:contentText.value});
localStorage.setItem("contents",JSON.stringify(contents));
renderCalendar();
contentText.value="";
}

function renderCalendar(){
calendarGrid.innerHTML="";
let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();
let days=new Date(year,month+1,0).getDate();
for(let d=1; d<=days; d++){
calendarGrid.innerHTML+=`<div class="day">${d}</div>`;
}
}
renderCalendar();

/* VIDEOS (LOCAL) */

function addVideo(){
if(!videoTitle.value) return;
videos.push({title:videoTitle.value,script:videoScript.value});
localStorage.setItem("videos",JSON.stringify(videos));
renderVideos();
videoTitle.value="";
videoScript.value="";
}

function renderVideos(){
videoList.innerHTML="";
videos.forEach((v,i)=>{
videoList.innerHTML+=`
<div class="card">
<h3>${v.title}</h3>
<textarea onchange="videos[${i}].script=this.value;localStorage.setItem('videos',JSON.stringify(videos));">${v.script}</textarea>
</div>
`;
});
}
renderVideos();

</script>
</body>
</html>

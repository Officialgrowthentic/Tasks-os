<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#111827;
--card:#1f2937;
--text:white;
--accent:#00f5d4;
}

.light{
--bg:#f3f4f6;
--card:white;
--text:#111827;
--accent:#2563eb;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px;
background:var(--card);
position:sticky;
top:0;
}

.nav button{
background:none;
border:none;
color:var(--text);
font-weight:600;
cursor:pointer;
}

.section{display:none;padding:20px;}
.active{display:block;}

.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

button.action{
background:var(--accent);
border:none;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
}

.circle{
width:120px;
height:120px;
position:relative;
margin:auto;
}

.circle svg{transform:rotate(-90deg);}

.circle span{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-weight:600;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:15px;
}

.day{
background:var(--card);
padding:10px;
border-radius:10px;
min-height:60px;
font-size:12px;
}

.alert{
background:#dc2626;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>
<body>

<div class="nav">
<div>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('tasks')">Tasks</button>
<button onclick="showSection('calendar')">Calendar</button>
<button onclick="showSection('videos')">Videos</button>
</div>
<button onclick="toggleMode()">🌗</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="priorityAlert"></div>

<div class="grid" id="progressCircles"></div>

<div class="card" id="videoStats"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Task Manager</h2>

<select id="taskCategory">
<option>Fitness</option>
<option>Business</option>
<option>Work</option>
<option>General</option>
</select>

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" id="taskInput" placeholder="Enter task">

<button class="action" onclick="addTask()">Add Task</button>

<div id="taskList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Content Calendar</h2>
<input type="month" id="monthPicker" onchange="renderCalendar()">
<input type="date" id="contentDate">
<input type="text" id="contentText" placeholder="Video Idea">
<button class="action" onclick="addContent()">Add</button>
<div class="calendar" id="calendarGrid"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Video Pipeline</h2>

<input type="text" id="videoTitle" placeholder="Video Title">
<select id="videoStage">
<option>Scripting</option>
<option>Shooting</option>
<option>Editing</option>
<option>Thumbnail</option>
<option>Uploaded</option>
</select>
<button class="action" onclick="addVideo()">Save</button>

<div id="videoList"></div>
</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let contents = JSON.parse(localStorage.getItem("contents")) || [];
let videos = JSON.parse(localStorage.getItem("videos")) || [];

function save(){
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("contents", JSON.stringify(contents));
  localStorage.setItem("videos", JSON.stringify(videos));
}

function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  updateDashboard();
}

function toggleMode(){
  document.body.classList.toggle("light");
}

/* ---------------- TASKS ---------------- */

function addTask(){
  let cat=document.getElementById("taskCategory").value;
  let pri=document.getElementById("taskPriority").value;
  let text=document.getElementById("taskInput").value;
  if(!text)return;

  tasks.push({cat,pri,text,done:false});
  document.getElementById("taskInput").value="";
  save();
  renderTasks();
  updateDashboard();
}

function toggleTask(i){
  tasks[i].done=!tasks[i].done;
  save();
  renderTasks();
  updateDashboard();
}

function renderTasks(){
  let list=document.getElementById("taskList");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    list.innerHTML+=`
    <div class="card">
      <b>${t.cat}</b> (${t.pri})
      <br>${t.text}
      <br>
      <button onclick="toggleTask(${i})">✔</button>
    </div>`;
  });
}

/* ---------------- VIDEOS ---------------- */

function addVideo(){
  let title=document.getElementById("videoTitle").value;
  let script=document.getElementById("videoScript").value;

  if(!title)return;

  videos.push({
    title,
    script,
    stages:{
      scripting:true,
      shooting:false,
      editing:false,
      thumbnail:false,
      uploaded:false
    }
  });

  document.getElementById("videoTitle").value="";
  document.getElementById("videoScript").value="";
  save();
  renderVideos();
  updateDashboard();
}

function toggleStage(index,stage){
  videos[index].stages[stage]=!videos[index].stages[stage];
  save();
  renderVideos();
  updateDashboard();
}

function updateScript(index,value){
  videos[index].script=value;
  save();
}

function renderVideos(){
  let list=document.getElementById("videoList");
  list.innerHTML="";

  videos.forEach((v,i)=>{

    let completed = Object.values(v.stages).filter(Boolean).length;
    let percent = Math.round((completed/5)*100);

    list.innerHTML+=`
    <div class="card">
      <h3>${v.title}</h3>

      <textarea rows="6"
      onchange="updateScript(${i},this.value)"
      placeholder="Write script here...">${v.script || ""}</textarea>

      <div style="margin-top:10px;">
        <label><input type="checkbox"
        ${v.stages.scripting?"checked":""}
        onclick="toggleStage(${i},'scripting')"> Scripting</label><br>

        <label><input type="checkbox"
        ${v.stages.shooting?"checked":""}
        onclick="toggleStage(${i},'shooting')"> Shooting</label><br>

        <label><input type="checkbox"
        ${v.stages.editing?"checked":""}
        onclick="toggleStage(${i},'editing')"> Editing</label><br>

        <label><input type="checkbox"
        ${v.stages.thumbnail?"checked":""}
        onclick="toggleStage(${i},'thumbnail')"> Thumbnail</label><br>

        <label><input type="checkbox"
        ${v.stages.uploaded?"checked":""}
        onclick="toggleStage(${i},'uploaded')"> Uploaded</label>
      </div>

      <div class="progressbar">
        <div class="progress" style="width:${percent}%"></div>
      </div>
      <b>${percent}% Complete</b>

    </div>`;
  });
}

/* ---------------- DASHBOARD ---------------- */

function updateDashboard(){

  let high=tasks.filter(t=>t.pri==="High"&&!t.done);
  document.getElementById("priorityAlert").innerHTML=
  high.length?`<div class="alert">⚠ ${high.length} High Priority Tasks Pending!</div>`:"";

  let cats=["Fitness","Business","Work","General"];
  let grid="";
  let totalTasks=tasks.length;
  let doneTasks=tasks.filter(t=>t.done).length;
  let overall=totalTasks?Math.round((doneTasks/totalTasks)*100):0;

  grid+=circleHTML("Overall",overall);

  cats.forEach(cat=>{
    let total=tasks.filter(t=>t.cat===cat).length;
    let done=tasks.filter(t=>t.cat===cat&&t.done).length;
    let p=total?Math.round((done/total)*100):0;
    grid+=circleHTML(cat,p);
  });

  document.getElementById("progressCircles").innerHTML=grid;

  let scripted=videos.filter(v=>v.stages.scripting).length;
  let shooting=videos.filter(v=>v.stages.shooting).length;
  let editing=videos.filter(v=>v.stages.editing).length;
  let uploaded=videos.filter(v=>v.stages.uploaded).length;

  document.getElementById("videoStats").innerHTML=`
  📝 Scripted: ${scripted}<br>
  🎥 Shooting: ${shooting}<br>
  ✂ Editing: ${editing}<br>
  🖼 Thumbnail: ${videos.filter(v=>v.stages.thumbnail).length}<br>
  🚀 Uploaded: ${uploaded}
  `;
}

function circleHTML(label,p){
  let r=55;
  let circ=2*Math.PI*r;
  let offset=circ-(circ*p)/100;
  return `
  <div class="circle">
    <svg width="140" height="140">
      <circle cx="70" cy="70" r="${r}" stroke="#334155" stroke-width="10" fill="none"/>
      <circle cx="70" cy="70" r="${r}" stroke="var(--accent)" stroke-width="10"
      fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      stroke-linecap="round"/>
    </svg>
    <span>${label}<br>${p}%</span>
  </div>`;
}

/* ---------------- INIT ---------------- */

renderTasks();
renderVideos();
updateDashboard();

</script>
</body>
</html>

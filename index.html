<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman OS 10.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#fff;
--accent:#22d3ee;
--danger:#ef4444;
}
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
.nav{display:flex;flex-wrap:wrap;gap:8px;padding:15px;background:var(--card);}
.nav button{background:none;border:none;color:var(--text);cursor:pointer;font-weight:600;}
.section{display:none;padding:20px;}
.active{display:block;}
.card{background:var(--card);padding:15px;border-radius:15px;margin-top:15px;}
input,select,textarea{width:100%;padding:8px;margin-top:6px;border-radius:10px;border:none;}
button.action{background:var(--accent);border:none;padding:8px;margin-top:8px;border-radius:10px;color:white;cursor:pointer;}
.progressbar{height:8px;background:#334155;border-radius:10px;overflow:hidden;margin-top:6px;}
.progress{height:100%;background:var(--accent);}
.flex{display:flex;gap:15px;flex-wrap:wrap;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
.day{background:var(--card);padding:6px;border-radius:8px;min-height:70px;font-size:11px;cursor:pointer;}
</style>
</head>
<body>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('tasks')">Tasks</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('calendar')">Calendar</button>
<button onclick="show('learning')">Learning</button>
<button onclick="show('finance')">Finance</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div id="taskDash"></div>
<div id="videoDash"></div>
<div id="financeDash"></div>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
<h2>Tasks</h2>

<input type="date" id="taskDateFilter">
<select id="taskOwner">
<option>Naman</option>
<option>Prateek</option>
</select>

<input placeholder="Task" id="taskText">
<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="action" onclick="addTask()">Add Task</button>

<div id="taskProgress"></div>
<div id="taskList"></div>
</div>

<!-- VIDEOS -->
<div id="videos" class="section">
<h2>Videos</h2>

<input placeholder="Topic" id="videoTopic">
<input type="date" id="videoDate">
<textarea placeholder="Script" id="videoScript"></textarea>
<button class="action" onclick="addVideo()">Add Video</button>

<select id="videoStageFilter" onchange="renderVideos()">
<option value="">All</option>
<option value="scripting">Scripting</option>
<option value="shooting">Shooting</option>
<option value="editing">Editing</option>
<option value="thumbnail">Thumbnail</option>
<option value="posting">Posting</option>
</select>

<div id="videoList"></div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
<h2>Calendar</h2>
<div id="calendarGrid" class="calendar"></div>
</div>

<!-- LEARNING -->
<div id="learning" class="section">
<h2>Learning</h2>
<div id="learningList"></div>
</div>

<!-- FINANCE -->
<div id="finance" class="section">
<h2>Finance</h2>

<select id="entryType">
<option>Revenue</option>
<option>Expense</option>
</select>

<input placeholder="Amount" type="number" id="entryAmount">
<input placeholder="Description" id="entryDesc">
<input type="date" id="entryDate">

<select id="entryOwner">
<option>Naman</option>
<option>Prateek</option>
<option>Split</option>
</select>

<button class="action" onclick="addEntry()">Add Entry</button>

<canvas id="financeChart"></canvas>
<div id="transactionList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyA9Ngg4cZ6H0gOePfHZ4GOg1_YZe5qZS7Y",
authDomain:"progress-app-6e9e6.firebaseapp.com",
projectId:"progress-app-6e9e6"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const tasksRef=db.collection("tasks");
const videosRef=db.collection("videos");
const learningRef=db.collection("learnings");
const financeRef=db.collection("finance");

let tasks=[],videos=[],finance=[];

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* TASKS */

function addTask(){
tasksRef.add({
text:taskText.value,
owner:taskOwner.value,
priority:taskPriority.value,
done:false,
date:taskDateFilter.value || new Date().toISOString().slice(0,10)
});
}

tasksRef.onSnapshot(s=>{
tasks=[];
s.forEach(d=>tasks.push({id:d.id,...d.data()}));
renderTasks();
updateDashboard();
});

function renderTasks(){
taskList.innerHTML="";
let date=taskDateFilter.value;
let filtered=tasks;
if(date) filtered=tasks.filter(t=>t.date===date);

filtered.forEach(t=>{
taskList.innerHTML+=`
<div class="card">
<input type="checkbox" ${t.done?"checked":""}
onclick="tasksRef.doc('${t.id}').update({done:${!t.done}})">
<b>${t.text}</b> (${t.owner})
<button onclick="tasksRef.doc('${t.id}').delete()">X</button>
</div>`;
});

let total=filtered.length;
let done=filtered.filter(t=>t.done).length;
let percent=total?Math.round((done/total)*100):0;
taskProgress.innerHTML=`Progress: ${percent}%`;

let naman=filtered.filter(t=>t.owner==="Naman");
let prateek=filtered.filter(t=>t.owner==="Prateek");

taskProgress.innerHTML+=`
<br>Naman: ${calc(naman)}% | Prateek: ${calc(prateek)}%
`;
}

function calc(arr){
let total=arr.length;
let done=arr.filter(t=>t.done).length;
return total?Math.round((done/total)*100):0;
}

/* VIDEOS */

function addVideo(){
videosRef.add({
topic:videoTopic.value,
script:videoScript.value,
publishDate:videoDate.value,
stages:{scripting:true,shooting:false,editing:false,thumbnail:false,posting:false}
});
}

videosRef.onSnapshot(s=>{
videos=[];
s.forEach(d=>videos.push({id:d.id,...d.data()}));
renderVideos();
renderCalendar();
updateDashboard();
});

function renderVideos(){
videoList.innerHTML="";
let filter=videoStageFilter.value;
videos.forEach(v=>{
if(filter && !v.stages[filter]) return;

let completed=Object.values(v.stages).filter(Boolean).length;
let percent=Math.round((completed/5)*100);

videoList.innerHTML+=`
<div class="card">
<b>${v.topic}</b>
<div>${percent}%</div>
${Object.keys(v.stages).map(stage=>`
<label><input type="checkbox"
${v.stages[stage]?"checked":""}
onclick="toggleStage('${v.id}','${stage}',${v.stages[stage]})">
${stage}</label>`).join("<br>")}
<textarea onchange="videosRef.doc('${v.id}').update({script:this.value})">${v.script}</textarea>
<button onclick="videosRef.doc('${v.id}').delete()">Delete</button>
</div>`;
});
}

function toggleStage(id,stage,current){
videosRef.doc(id).update({[`stages.${stage}`]:!current});
if(stage==="posting"&&!current){
let v=videos.find(v=>v.id===id);
learningRef.doc(v.topic).set({topic:v.topic});
}
}

/* LEARNING */

learningRef.onSnapshot(s=>{
learningList.innerHTML="";
s.forEach(d=>{
learningList.innerHTML+=`
<div class="card">
<b>${d.data().topic}</b>
<textarea onchange="learningRef.doc('${d.id}').update({notes:this.value})">
${d.data().notes||""}</textarea>
</div>`;
});
});

/* CALENDAR */

function renderCalendar(){
calendarGrid.innerHTML="";
let now=new Date();
let year=now.getFullYear();
let month=now.getMonth();
let days=new Date(year,month+1,0).getDate();
for(let d=1;d<=days;d++){
let full=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
let vids=videos.filter(v=>v.publishDate===full);
calendarGrid.innerHTML+=`
<div class="day" onclick="openDay('${full}')">
<b>${d}</b><br>${vids.map(v=>v.topic).join("<br>")}
</div>`;
}
}

function openDay(date){
show('videos');
videoStageFilter.value="";
videoList.innerHTML="";
videos.filter(v=>v.publishDate===date)
.forEach(v=>{
videoList.innerHTML+=`<div class="card"><b>${v.topic}</b></div>`;
});
}

/* FINANCE */

function addEntry(){
financeRef.add({
type:entryType.value,
amount:Number(entryAmount.value),
desc:entryDesc.value,
owner:entryOwner.value,
date:entryDate.value
});
}

financeRef.onSnapshot(s=>{
finance=[];
transactionList.innerHTML="";
s.forEach(d=>{
let f=d.data();
finance.push(f);
transactionList.innerHTML+=`
<div class="card">${f.type} - ${f.amount} (${f.owner})
<button onclick="financeRef.doc('${d.id}').delete()">X</button>
</div>`;
});
updateDashboard();
});

function updateDashboard(){
let videoCounts={
total:videos.length,
scripted:videos.filter(v=>v.stages.scripting).length,
shooting:videos.filter(v=>v.stages.shooting).length,
editing:videos.filter(v=>v.stages.editing).length,
posted:videos.filter(v=>v.stages.posting).length
};

videoDash.innerHTML=`
Videos: ${videoCounts.total}<br>
Scripted: ${videoCounts.scripted}<br>
Shooting: ${videoCounts.shooting}<br>
Editing: ${videoCounts.editing}<br>
Posted: ${videoCounts.posted}
`;

let revenue=finance.filter(f=>f.type==="Revenue").reduce((a,b)=>a+b.amount,0);
let expense=finance.filter(f=>f.type==="Expense").reduce((a,b)=>a+b.amount,0);
financeDash.innerHTML=`Revenue: ${revenue}<br>Expense: ${expense}<br>Net: ${revenue-expense}`;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naman OS 13</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{margin:0;font-family:Inter;background:#0f172a;color:white}

.nav{display:flex;flex-wrap:wrap;gap:10px;background:#1e293b;padding:12px}
.nav button{background:none;border:none;color:white;font-weight:600;cursor:pointer}

.section{display:none;padding:20px}
.active{display:block}

.card{background:#1e293b;padding:14px;border-radius:12px;margin-top:10px}

input,select,textarea{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:none
}

button.action{
background:#22d3ee;
border:none;
padding:8px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
font-weight:600
}

.progressbar{
height:8px;
background:#334155;
border-radius:6px;
margin-top:6px;
overflow:hidden
}

.progress{height:100%;background:#22d3ee}

.flex{display:flex;gap:20px;flex-wrap:wrap}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:12px
}

.day{
background:#1e293b;
padding:8px;
border-radius:8px;
font-size:11px;
cursor:pointer
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center
}

.modalBox{
background:#1e293b;
padding:20px;
width:90%;
max-width:900px;
border-radius:10px
}

</style>
</head>

<body>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('tasks')">Tasks</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('calendar')">Calendar</button>
<button onclick="show('learning')">Learning</button>
<button onclick="show('finance')">Finance</button>
<button onclick="show('goals')">Goals</button>
</div>

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<h2>Analytics</h2>

<div class="flex">

<canvas id="taskChart"></canvas>
<canvas id="videoChart"></canvas>
<canvas id="financeChart"></canvas>
<canvas id="earnChart"></canvas>
<canvas id="goalChart"></canvas>

</div>

<div id="dashStats" class="card"></div>

</div>

<!-- TASKS -->

<div id="tasks" class="section">

<h2>Tasks</h2>

<input type="date" id="taskDateFilter">

<select id="taskOwner">
<option>Naman</option>
<option>Prateek</option>
</select>

<input id="taskSub" placeholder="Subfolder">
<input id="taskText" placeholder="Task">

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="action" onclick="addTask()">Add Task</button>

<select id="subFilter" onchange="renderTasks()"></select>

<label>
<input type="checkbox" id="pendingOnly" onchange="renderTasks()"> Pending only
</label>

<div id="taskProgress"></div>

<div id="taskList"></div>

</div>

<!-- VIDEOS -->

<div id="videos" class="section">

<h2>Videos</h2>

<input id="videoTopic" placeholder="Topic">
<input type="date" id="videoDate">
<textarea id="videoScript" placeholder="Script"></textarea>

<button class="action" onclick="addVideo()">Add Video</button>

<div id="videoList"></div>

</div>

<!-- CALENDAR -->

<div id="calendar" class="section">
<h2>Calendar</h2>
<div id="calendarGrid" class="calendar"></div>
</div>

<!-- LEARNING -->

<div id="learning" class="section">

<h2>Learning</h2>

<input id="learningTopic" placeholder="Topic">
<textarea id="learningNotes"></textarea>

<button onclick="addLearning()">Add Learning</button>

<div id="learningList"></div>

</div>

<!-- FINANCE -->

<div id="finance" class="section">

<h2>Finance</h2>

<select id="entryType">
<option>Revenue</option>
<option>Expense</option>
</select>

<input type="number" id="entryAmount" placeholder="Amount">
<input id="entryDesc" placeholder="Description">
<input type="date" id="entryDate">

<select id="entryOwner">
<option>Naman</option>
<option>Prateek</option>
<option>Split</option>
</select>

<button class="action" onclick="addEntry()">Add Entry</button>

<div id="financeTotals" class="card"></div>

<div id="transactionList"></div>

</div>

<!-- GOALS -->

<div id="goals" class="section">

<h2>Monthly Goals</h2>

<input id="goalText">
<button onclick="addGoal()">Add Goal</button>

<div id="goalList"></div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyA9Ngg4cZ6H0gOePfHZ4GOg1_YZe5qZS7Y",
authDomain: "progress-app-6e9e6.firebaseapp.com",
projectId: "progress-app-6e9e6",
storageBucket: "progress-app-6e9e6.firebasestorage.app",
messagingSenderId: "867817123277",
appId: "1:867817123277:web:6d8fd798a621684295a884",
measurementId: "G-V5QGRLH4NE"
};

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const tasksRef=db.collection("tasks")
const videosRef=db.collection("videos")
const learningRef=db.collection("learning")
const financeRef=db.collection("finance")
const goalsRef=db.collection("goals")

let tasks=[],videos=[],finance=[],goals=[]

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function addTask(){
tasksRef.add({
text:taskText.value,
owner:taskOwner.value,
sub:taskSub.value,
priority:taskPriority.value,
done:false,
date:taskDateFilter.value || new Date().toISOString().slice(0,10)
})
}

tasksRef.onSnapshot(s=>{
tasks=[]
s.forEach(d=>tasks.push({id:d.id,...d.data()}))
renderTasks()
updateDashboard()
})

function renderTasks(){

taskList.innerHTML=""

let filtered=tasks

if(taskDateFilter.value)
filtered=filtered.filter(t=>t.date===taskDateFilter.value)

if(subFilter.value)
filtered=filtered.filter(t=>t.sub===subFilter.value)

if(pendingOnly.checked)
filtered=filtered.filter(t=>!t.done)

filtered.forEach(t=>{

taskList.innerHTML+=`
<div class="card">

<input type="checkbox" ${t.done?"checked":""}
onclick="tasksRef.doc('${t.id}').update({done:${!t.done}})">

<b>${t.text}</b> (${t.owner})

<button onclick="tasksRef.doc('${t.id}').delete()">Delete</button>

</div>
`

})

}

function addVideo(){
videosRef.add({
topic:videoTopic.value,
script:videoScript.value,
publishDate:videoDate.value
})
}

videosRef.onSnapshot(s=>{
videos=[]
s.forEach(d=>videos.push({id:d.id,...d.data()}))
renderVideos()
})

function renderVideos(){

videoList.innerHTML=""

videos.forEach(v=>{

videoList.innerHTML+=`

<div class="card">

<b>${v.topic}</b>

<button onclick="videosRef.doc('${v.id}').delete()">Delete</button>

</div>

`

})

}

function addEntry(){

let amount=Number(entryAmount.value)

if(entryOwner.value==="Split"){

financeRef.add({type:entryType.value,amount:amount/2,desc:entryDesc.value,owner:"Naman",date:entryDate.value})

financeRef.add({type:entryType.value,amount:amount/2,desc:entryDesc.value,owner:"Prateek",date:entryDate.value})

}else{

financeRef.add({type:entryType.value,amount:amount,desc:entryDesc.value,owner:entryOwner.value,date:entryDate.value})

}

}

financeRef.onSnapshot(s=>{
finance=[]
transactionList.innerHTML=""
s.forEach(d=>{
finance.push({id:d.id,...d.data()})
let f=d.data()

transactionList.innerHTML+=`

<div class="card">

${f.desc} ₹${f.amount} (${f.owner})

<button onclick="financeRef.doc('${d.id}').delete()">Delete</button>

</div>

`
})

})

function updateDashboard(){

let taskDone=tasks.filter(t=>t.done).length
let taskTotal=tasks.length

dashStats.innerHTML=`
Tasks ${taskDone}/${taskTotal}
`

}

</script>

</body>
</html>

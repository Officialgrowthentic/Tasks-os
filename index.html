<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naman OS 13</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{margin:0;font-family:Inter;background:#0f172a;color:white}

.nav{display:flex;flex-wrap:wrap;gap:10px;background:#1e293b;padding:12px}
.nav button{background:none;border:none;color:white;font-weight:600;cursor:pointer}

.section{display:none;padding:20px}
.active{display:block}

.card{background:#1e293b;padding:14px;border-radius:12px;margin-top:10px}

input,select,textarea{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:none
}

button.action{
background:#22d3ee;
border:none;
padding:8px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
font-weight:600
}

.progressbar{
height:8px;
background:#334155;
border-radius:6px;
margin-top:6px;
overflow:hidden
}

.progress{height:100%;background:#22d3ee}

.flex{display:flex;gap:20px;flex-wrap:wrap}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-top:12px
}

.day{
background:#1e293b;
padding:8px;
border-radius:8px;
font-size:11px;
cursor:pointer
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center
}

.modalBox{
background:#1e293b;
padding:20px;
width:90%;
max-width:900px;
border-radius:10px
}

</style>
</head>

<body>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('tasks')">Tasks</button>
<button onclick="show('videos')">Videos</button>
<button onclick="show('calendar')">Calendar</button>
<button onclick="show('learning')">Learning</button>
<button onclick="show('finance')">Finance</button>
<button onclick="show('goals')">Goals</button>
</div>

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<h2>Analytics</h2>

<div class="flex">

<canvas id="taskChart"></canvas>
<canvas id="videoChart"></canvas>
<canvas id="financeChart"></canvas>
<canvas id="earnChart"></canvas>
<canvas id="goalChart"></canvas>

</div>

<div id="dashStats" class="card"></div>

</div>

<!-- TASKS -->

<div id="tasks" class="section">

<h2>Tasks</h2>

<input type="date" id="taskDateFilter">

<select id="taskOwner">
<option>Naman</option>
<option>Prateek</option>
</select>

<input id="taskSub" placeholder="Subfolder">
<input id="taskText" placeholder="Task">

<select id="taskPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="action" onclick="addTask()">Add Task</button>

<select id="subFilter" onchange="renderTasks()"></select>

<label>
<input type="checkbox" id="pendingOnly" onchange="renderTasks()"> Pending only
</label>

<div id="taskProgress"></div>

<div id="taskList"></div>

</div>

<!-- VIDEOS -->

<div id="videos" class="section">

<h2>Videos</h2>

<input id="videoTopic" placeholder="Topic">
<input type="date" id="videoDate">
<textarea id="videoScript" placeholder="Script"></textarea>

<button class="action" onclick="addVideo()">Add Video</button>

<div id="videoList"></div>

</div>

<!-- SCRIPT MODAL -->

<div id="scriptModal" class="modal">
<div class="modalBox">
<h3 id="modalTitle"></h3>
<textarea id="modalScript" style="height:300px"></textarea>
<button onclick="saveScript()">Save</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- CALENDAR -->

<div id="calendar" class="section">
<h2>Calendar</h2>
<div id="calendarGrid" class="calendar"></div>
</div>

<!-- LEARNING -->

<div id="learning" class="section">
<h2>Learning</h2>

<input id="learningTopic" placeholder="Topic">
<textarea id="learningNotes"></textarea>

<button onclick="addLearning()">Add Learning</button>

<div id="learningList"></div>

</div>

<!-- FINANCE -->

<div id="finance" class="section">

<h2>Finance</h2>

<select id="entryType">
<option>Revenue</option>
<option>Expense</option>
</select>

<input type="number" id="entryAmount" placeholder="Amount">
<input id="entryDesc" placeholder="Description">
<input type="date" id="entryDate">

<select id="entryOwner">
<option>Naman</option>
<option>Prateek</option>
<option>Split</option>
</select>

<button class="action" onclick="addEntry()">Add Entry</button>

<div id="financeTotals" class="card"></div>

<div id="transactionList"></div>

</div>

<!-- GOALS -->

<div id="goals" class="section">

<h2>Monthly Goals</h2>

<input id="goalText">
<button onclick="addGoal()">Add Goal</button>

<div id="goalList"></div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

const tasksRef=db.collection("tasks")
const videosRef=db.collection("videos")
const learningRef=db.collection("learning")
const financeRef=db.collection("finance")
const goalsRef=db.collection("goals")

let tasks=[],videos=[],finance=[],goals=[]

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function addTask(){
tasksRef.add({
text:taskText.value,
owner:taskOwner.value,
sub:taskSub.value,
priority:taskPriority.value,
done:false,
date:taskDateFilter.value || new Date().toISOString().slice(0,10)
})
}

tasksRef.onSnapshot(s=>{
tasks=[]
s.forEach(d=>tasks.push({id:d.id,...d.data()}))
renderTasks()
updateDashboard()
})

function renderTasks(){

taskList.innerHTML=""

let filtered=tasks

if(taskDateFilter.value)
filtered=filtered.filter(t=>t.date===taskDateFilter.value)

if(subFilter.value)
filtered=filtered.filter(t=>t.sub===subFilter.value)

if(pendingOnly.checked)
filtered=filtered.filter(t=>!t.done)

filtered.forEach(t=>{

taskList.innerHTML+=`
<div class="card">

<input type="checkbox" ${t.done?"checked":""}
onclick="tasksRef.doc('${t.id}').update({done:${!t.done}})">

<b>${t.text}</b> (${t.owner})

<button onclick="tasksRef.doc('${t.id}').delete()">Delete</button>

</div>
`

})

updateSubFolders()
updateTaskProgress(filtered)

}

function updateSubFolders(){

let subs=[...new Set(tasks.map(t=>t.sub).filter(Boolean))]

subFilter.innerHTML=`<option value="">All Subfolders</option>`

subs.forEach(s=>{
subFilter.innerHTML+=`<option value="${s}">${s}</option>`
})

}

function updateTaskProgress(list){

let total=list.length
let done=list.filter(t=>t.done).length

let naman=list.filter(t=>t.owner==="Naman")
let prateek=list.filter(t=>t.owner==="Prateek")

function p(arr){
return arr.length?Math.round(arr.filter(a=>a.done).length/arr.length*100):0
}

taskProgress.innerHTML=`

Overall ${p(list)}%

<div class="progressbar"><div class="progress" style="width:${p(list)}%"></div></div>

Naman ${p(naman)}%

<div class="progressbar"><div class="progress" style="width:${p(naman)}%"></div></div>

Prateek ${p(prateek)}%

<div class="progressbar"><div class="progress" style="width:${p(prateek)}%"></div></div>

`

}

function updateDashboard(){

let taskDone=tasks.filter(t=>t.done).length
let taskTotal=tasks.length

let videoPosted=videos.filter(v=>v.stages?.posting).length
let videoTotal=videos.length

let revenue=finance.filter(f=>f.type==="Revenue").reduce((a,b)=>a+b.amount,0)
let expense=finance.filter(f=>f.type==="Expense").reduce((a,b)=>a+b.amount,0)

dashStats.innerHTML=`
Tasks ${taskDone}/${taskTotal}<br>
Videos ${videoPosted}/${videoTotal}<br>
Revenue ₹${revenue}<br>
Expense ₹${expense}<br>
Net ₹${revenue-expense}
`

}

</script>

</body>
</html>
